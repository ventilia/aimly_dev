services:
  postgres:
    image: postgres:16-alpine
    container_name: aimly_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aimly
      POSTGRES_USER: aimly
      POSTGRES_PASSWORD: aimly_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimly -d aimly"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: