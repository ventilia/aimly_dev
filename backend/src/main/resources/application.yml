spring:
  application:
    name: aimly-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/aimly}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:aimly}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:aimly_dev_password}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

  security:
    user:
      name: disabled
      password: disabled

# ─── JWT ───────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS}

# ─── Email (Resend) ────────────────────────────────────────────────────────────
resend:
  api-key: ${RESEND_API_KEY}
  from-email: noreply@getaimly.io
  from-name: AIMLY

# ─── Telegram Bot ──────────────────────────────────────────────────────────────
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME}

# ─── Rate Limiting ─────────────────────────────────────────────────────────────
rate-limit:
  login:
    max-attempts: 5
    window-minutes: 15
    block-minutes: 30

# ─── Application ───────────────────────────────────────────────────────────────
app:
  allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  cookie:
    secure: ${COOKIE_SECURE:false}
    domain: ${COOKIE_DOMAIN:}

# ─── Userbot (Go-сервис) ───────────────────────────────────────────────────────
userbot:
  url: ${USERBOT_URL:http://localhost:9090}

# ─── Internal API Secret (для связи с userbot) ─────────────────────────────────
internal:
  api-secret: ${INTERNAL_API_SECRET:aimly_internal_secret_change_in_prod}

# ─── Server ────────────────────────────────────────────────────────────────────
server:
  port: 8080

# ─── AI (Groq) ─────────────────────────────────────────────────────────────────
groq:
  api-key: ${GROQ_API_KEY:REDACTED_GROQ_KEY}

# ─── TGStat API ────────────────────────────────────────────────────────────────
# ИСПРАВЛЕНО: api-token → api-key (соответствует имени переменной в контроллере)
tgstat:
  api-key: ${TGSTAT_API_KEY:028e2ad9731533d769b517c582e3cf6a}

# ─── Management & Monitoring ───────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ─── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    io.getaimly: DEBUG
    org.springframework.security: DEBUG
    io.getaimly.backend.lead.TgstatSearchController: DEBUG